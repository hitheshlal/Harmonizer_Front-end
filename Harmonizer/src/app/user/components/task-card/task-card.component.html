<div class="task-card">
  <!-- <div class="status-indicator" [class]="task.status"></div> -->
  <div class="text-box">
    <h4>{{ task.title }}</h4>
    <p>{{ task.description }}</p>
  </div>

  <div class="actions">
    <small>{{ task.date }}</small>
    <div class="actions-buttons">
      <button (click)="editTask(task)">✏️</button>
      <button (click)="deleteTask(task)">🗑️</button>
    </div>




  </div>

</div>
