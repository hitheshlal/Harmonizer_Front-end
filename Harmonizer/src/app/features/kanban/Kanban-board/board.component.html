<div class="kanban-board" *ngIf="showKanban">
  <div class="column-container">
    <div class="column-heading to-do-heading">
      <h3>To do</h3>
      <span class="count">{{ toDoTasks.length }}</span>
    </div>
    <div class="column to-do"
      cdkDropList
      id="todoList"
      [cdkDropListData]="toDoTasks"
      [cdkDropListConnectedTo]="['inProgressList', 'doneList']"
      (cdkDropListDropped)="drop($event)"
      (cdkDropListEntered)="entered($event)"
      (cdkDropListExited)="exited($event)">
      <app-task-card *ngFor="let task of toDoTasks" [task]="task" cdkDrag [cdkDragData]="task"></app-task-card>
    </div>
  </div>

  <div class="column-container">
    <div class="column-heading in-progress-heading">
      <h3>In-Progress</h3>
      <span class="count">{{ inProgressTasks.length }}</span>
    </div>
    <div class="column in-progress"
      cdkDropList
      id="inProgressList"
      [cdkDropListData]="inProgressTasks"
      [cdkDropListConnectedTo]="['todoList', 'doneList']"
      (cdkDropListDropped)="drop($event)"
      (cdkDropListEntered)="entered($event)"
      (cdkDropListExited)="exited($event)">
      <app-task-card *ngFor="let task of inProgressTasks" [task]="task" cdkDrag></app-task-card>
    </div>
  </div>

  <div class="column-container">
    <div class="column-heading done-heading">
      <h3>Done</h3>
      <span class="count">{{ doneTasks.length }}</span>
    </div>
    <div class="column done"
      cdkDropList
      id="doneList"
      [cdkDropListData]="doneTasks"
      [cdkDropListConnectedTo]="['todoList', 'inProgressList']"
      (cdkDropListDropped)="drop($event)"
      (cdkDropListEntered)="entered($event)"
      (cdkDropListExited)="exited($event)">
      <app-task-card *ngFor="let task of doneTasks" [task]="task" cdkDrag></app-task-card>
    </div>
  </div>

  <button id="plusButton" (click)="showAddTaskForm()">
    <div class="circle">
      <i class="fa-solid fa-plus fa-xl"></i>
    </div>
  </button>
</div>

<!-- add new task form -->
<div class="task-form" *ngIf="!showKanban && showAddTaskForm">
  <h3 class="form-heading">Add New Task</h3>
  <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="taskTitle">Title <span class="required">*</span></label>
      <input type="text" id="taskTitle" name="taskTitle" placeholder="Enter task title" required formControlName="title"/>
      <!-- Error message -->
      <div class="error-message"
      *ngIf="f['title'].touched && f['title'].errors?.['required']">
    Please enter a task title
    </div>
    </div>

    <div class="form-group">
      <label for="taskDescription">Description</label>
      <textarea
        id="taskDescription"
        name="taskDescription"
        placeholder="Provide a brief description of the task"
        rows="4"
        formControlName="description"
      ></textarea>
    </div>

    <div class="form-group">
      <label for="taskDate">Due Date</label>
      <input type="date" id="taskDate" name="taskDate" formControlName="duedate" />
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-cancel" (click)="cancelAddTask()">Cancel</button>
      <button type="submit" class="btn btn-submit">Add Task</button>
    </div>
  </form>
</div>
